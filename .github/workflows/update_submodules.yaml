name: Update Submodules

on:
  schedule:
    - cron: '0 8 * * 1'  # Run every Monday at 8 AM UTC
  workflow_dispatch:     # Allow manual triggering

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.GH_TOKEN }}

      - name: Git config
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Create branch for updates
        run: |
          # Create a new branch with timestamp
          BRANCH_NAME="chore/submodule-updates-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Update submodules
        id: update
        run: |
          # Exit on error
          set -e

          echo "Updating submodules..."
          if ! git submodule update --init --recursive --remote; then
            echo "::error::Failed to update submodules"
            exit 1
          fi

          # Check if any changes were made
          if [[ -n $(git status -s) ]]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            git add .
            git commit -m "Update submodules to latest commits"
            git push origin $BRANCH_NAME
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.update.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ env.GH_TOKEN }}
          commit-message: "chore: update submodules to latest commits"
          title: 'chore: automated update of submodules to latest commits'
          body: |
            ## Description
            This PR was automatically created by the Update Submodules GitHub Action.
            It updates all submodules to their latest commits on their respective branches.

            ## Changes
            ```
            $(git submodule status)
            ```

            ## Checklist
            - [ ] Review submodule changes
            - [ ] Test changes locally
          branch: ${{ env.BRANCH_NAME }}
          base: humble
          labels: automated,submodules
          reviewers: ${{ github.repository_owner }}
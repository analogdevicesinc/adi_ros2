name: Generate documentation
on:
    push:
      branches:
        - humble
        - humble-develop
    pull_request:

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  build-doc:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        persist-credentials: false
        token: ${{ env.GH_TOKEN }}
        submodules: true

    - name: Set up Python3 environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install pip packages
      working-directory: src/adi_ros2/doc
      run: |
        pip install pip --upgrade
        pip install -r requirements.txt

    - name: Build doc
      working-directory: ci
      run: |
        ./build_doc.sh

    - name: Store the generated doc
      uses: actions/upload-artifact@v4
      with:
        name: html
        path: _build/docs_output

  deploy-doc:
    runs-on: ubuntu-latest
    needs: build-doc
    if: github.ref == 'refs/heads/humble'

    steps:
    - run: |
        git config --global user.name "${{ github.event.head_commit.committer.name }}"
        git config --global user.email "${{ github.event.head_commit.committer.email }}"

    - uses: actions/checkout@v4
    - name: Create gh-pages branch
      run: >
        git ls-remote --exit-code --heads origin refs/heads/gh-pages ||
        (
          git reset --hard ;
          git clean -fdx ;
          git checkout --orphan gh-pages ;
          git reset --hard;
          git commit -m "empty" --allow-empty ;
          git push origin gh-pages:gh-pages
        )

    - uses: actions/checkout@v4
      with:
        ref: 'gh-pages'

    - name: Empty gh-pages
      run: |
        git rm -r . --quiet || true

    - uses: actions/download-artifact@v4
      with:
        name: html

    - name: Patch doc build
      run: |
        [ -d "_sources" ] && rm -rf _sources
        touch .nojekyll
        # Create a redirecting index.html at the root of the gh-pages branch
        echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=adi_meta/index.html"></head><body></body></html>' > index.html

    - name: Commit gh-pages
      run: |
        git add . >> /dev/null
        git commit -m "deploy: ${GITHUB_SHA}" --allow-empty

    - name: Push to gh-pages
      run: |
        git push origin gh-pages:gh-pages
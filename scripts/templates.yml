# Repository
adi_ros2:
  - name: humble-amd64
    ros_distro: humble
    arch: amd64
    targets:
      - target: base
        platforms: "linux/amd64"
      - target: full
        platforms: "linux/amd64"
      - target: desktop
        platforms: "linux/amd64"
    base_image: "ros"
    image_version: "humble-ros-base"
    libiio_tag: "libiio-v0"
  - name: humble-arm64
    ros_distro: humble
    arch: arm64
    targets:
      - target: base
        platforms: "linux/arm64"
      - target: full
        platforms: "linux/arm64"
      - target: desktop
        platforms: "linux/arm64"
    base_image: "ros"
    image_version: "humble-ros-base"
    libiio_tag: "libiio-v0"
adi_ros2-l4t:
  - name: humble-l4t_r36.2.0
    ros_distro: humble
    arch: arm64
    targets:
      - target: base
        platforms: "linux/arm64"
      - target: full
        platforms: "linux/arm64"
      - target: desktop
        platforms: "linux/arm64"
    base_image: "nvcr.io/nvidia/l4t-base"
    image_version: "r36.2.0"
    libiio_tag: "libiio-v0"
